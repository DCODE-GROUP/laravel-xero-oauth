name: Test Pull Requests

on: [pull_request]

jobs:
    run-tests:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.3
                  tools: composer:v2
                  coverage: xdebug

            - name: Install Dependencies
              run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --optimize-autoloader

            - name: Build Workbench
              run: vendor/bin/testbench workbench:build
            - name: Sync Workbench Skeleton
              run: vendor/bin/testbench workbench:sync-skeleton

            - name: Run Tests
              run: vendor/bin/pest --parallel --ci
