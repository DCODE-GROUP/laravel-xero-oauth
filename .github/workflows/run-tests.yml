name: Test Pull Requests

on: [pull_request]

jobs:
    run-tests:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: 8.5
                  tools: composer:v2
                  coverage: xdebug

            - name: Install Dependencies
              run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --optimize-autoloader

            - name: Discover Packages
              run: vendor/bin/testbench package:discover

            - name: Run Tests
              run: vendor/bin/testbench package:test --parallel --compact
